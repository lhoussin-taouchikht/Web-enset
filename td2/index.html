<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 { font-size: 20px; margin-bottom: 20px; }

        fieldset {
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 15px;
        }

        legend { font-weight: bold; font-size: 14px; }

        label {
            display: block;
            font-size: 13px;
            margin-top: 10px;
            margin-bottom: 3px;
        }

        input, textarea {
            width: 100%;
            padding: 7px;
            font-size: 14px;
            border: 1px solid #aaa;
            box-sizing: border-box;
        }

        .hint { font-size: 11px; color: #888; margin-top: 2px; }

        .radio-group label,
        .check-group label {
            display: inline;
            margin-right: 12px;
            font-size: 13px;
        }

        .cgu { font-size: 13px; margin-bottom: 15px; }
        .cgu a { color: #000; }

        button {
            width: 100%;
            padding: 10px;
            font-size: 15px;
            background: #333;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover { background: #555; }
    </style>
</head>
<body>

<h1>Créer un compte</h1>

<form action="#" method="post" enctype="multipart/form-data">

    <fieldset>
        <legend>Informations personnelles</legend>

        <label for="prenom">Prénom *</label>
        <input type="text" id="prenom" name="prenom" required minlength="2" maxlength="50" placeholder="LHOU" autocomplete="given-name">

        <label for="nom">Nom *</label>
        <input type="text" id="nom" name="nom" required minlength="2" maxlength="50" placeholder="TAOU" autocomplete="family-name">

        <label for="email">Email *</label>
        <input type="email" id="email" name="email" required placeholder="LHOU@email.com" autocomplete="email">

        <label for="telephone">Téléphone *</label>
        <input type="tel" id="telephone" name="telephone" required pattern="^(?:\+212|0)[5-7]\d{8}$" placeholder="0600000000" autocomplete="tel">
        <p class="hint">Format : 06XXXXXXXX ou +212 6XXXXXXXX</p>

        <label for="ddn">Date de naissance * (18 ans minimum)</label>
        <input type="date" id="ddn" name="date_naissance" required max="2007-01-01" autocomplete="bday">

        <label>Genre *</label>
        <div class="radio-group">
            <label><input type="radio" name="genre" value="homme" required> Homme</label>
            <label><input type="radio" name="genre" value="femme"> Femme</label>
            <label><input type="radio" name="genre" value="autre"> Autre</label>
            <label><input type="radio" name="genre" value="nr"> Ne pas préciser</label>
        </div>
    </fieldset>

    <fieldset>
        <legend>Sécurité</legend>

        <label for="mdp">Mot de passe *</label>
        <input type="password" id="mdp" name="mot_de_passe" required minlength="8" pattern="^(?=.*[A-Z])(?=.*\d).{8,}$" autocomplete="new-password">
        <p class="hint">Min. 8 caractères, 1 majuscule, 1 chiffre</p>

        <label for="mdp2">Confirmer le mot de passe *</label>
        <input type="password" id="mdp2" name="mot_de_passe_confirm" required minlength="8" autocomplete="new-password">
        <p class="hint">La confirmation est vérifiée côté serveur.</p>
    </fieldset>

    <fieldset>
        <legend>Localisation</legend>

        <label for="pays">Pays *</label>
        <input type="text" id="pays" name="pays" list="pays-liste" required placeholder="Tapez votre pays..." autocomplete="country-name">
        <datalist id="pays-liste">
            <option value="Maroc">
            <option value="France">
            <option value="Algérie">
            <option value="Tunisie">
            <option value="Belgique">
            <option value="Canada">
        </datalist>
    </fieldset>

    <fieldset>
        <legend>Profil &amp; intérêts</legend>

        <label>Centres d'intérêt</label>
        <div class="check-group">
            <label><input type="checkbox" name="interets" value="tech"> Technologie</label>
            <label><input type="checkbox" name="interets" value="design"> Design</label>
            <label><input type="checkbox" name="interets" value="sport"> Sport</label>
            <label><input type="checkbox" name="interets" value="musique"> Musique</label>
            <label><input type="checkbox" name="interets" value="voyage"> Voyage</label>
        </div>

        <label for="bio">Biographie (500 caractères max)</label>
        <textarea id="bio" name="biographie" rows="4" maxlength="500" placeholder="Parlez-nous de vous..."></textarea>

        <label for="photo">Photo de profil</label>
        <input type="file" id="photo" name="photo_profil" accept="image/jpeg,image/png,image/webp">
        <p class="hint">Formats acceptés : JPG, PNG, WebP</p>
    </fieldset>

    <div class="cgu">
        <label>
            <input type="checkbox" name="cgu" required>
            J'accepte les <a href="#">Conditions Générales d'Utilisation</a> *
        </label>
    </div>

    <button type="submit">Créer mon compte</button>

</form>

</body>
</html>
